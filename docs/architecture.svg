<svg xmlns="http://www.w3.org/2000/svg" width="910" height="360" viewBox="0 0 910 360" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#5a5a5a"/>
    </marker>
  </defs>

  <!-- ============ arrows (drawn first, behind boxes) ============ -->
  <g stroke="#5a5a5a" stroke-width="1.6" marker-end="url(#arrow)">
    <line x1="165" y1="138" x2="247" y2="90"/>
    <line x1="165" y1="162" x2="247" y2="210"/>
    <line x1="430" y1="90"  x2="524" y2="135"/>
    <line x1="430" y1="210" x2="524" y2="165"/>
    <line x1="692" y1="150" x2="762" y2="150"/>
  </g>

  <!-- ============ boxes ============ -->
  <!-- Data & Groups -->
  <rect x="15" y="70" width="150" height="160" rx="9" fill="#f2f2f2" stroke="#8c8c8c" stroke-width="1.2"/>
  <text x="90" y="120" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1a1a">Data &amp; Groups<tspan x="90" dy="26" font-size="12" font-weight="normal" fill="#555">license-aware datasets</tspan><tspan x="90" dy="18" font-size="12" font-weight="normal" fill="#555">preprocessing</tspan><tspan x="90" dy="18" font-size="12" font-weight="normal" fill="#555">synthetic groups &amp; utilities</tspan></text>

  <!-- Aggregation -->
  <rect x="250" y="47" width="180" height="76" rx="9" fill="#e6f4ea" stroke="#8c8c8c" stroke-width="1.2"/>
  <text x="340" y="72" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1a1a">Aggregation<tspan x="340" dy="18" font-size="12" font-style="italic" font-weight="normal" fill="#666">results-first</tspan><tspan x="340" dy="17" font-size="12" font-weight="normal" fill="#555">base RS &#8594; aggregator</tspan></text>

  <!-- Representation learning -->
  <rect x="250" y="177" width="180" height="76" rx="9" fill="#ebe5f7" stroke="#8c8c8c" stroke-width="1.2"/>
  <text x="340" y="202" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a1a">Representation learning<tspan x="340" dy="18" font-size="12" font-style="italic" font-weight="normal" fill="#666">profile-first</tspan><tspan x="340" dy="17" font-size="12" font-weight="normal" fill="#555">deep group models</tspan></text>

  <!-- Evaluation -->
  <rect x="527" y="70" width="165" height="160" rx="9" fill="#e4f4f9" stroke="#8c8c8c" stroke-width="1.2"/>
  <text x="609" y="108" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1a1a">Evaluation<tspan x="609" dy="26" font-size="12" font-weight="normal" fill="#555">coupled / decoupled</tspan><tspan x="609" dy="18" font-size="12" font-weight="normal" fill="#555">sampled &#183; group-LOO</tspan><tspan x="609" dy="16" font-size="12" font-weight="normal" fill="#555">&#183; sequential</tspan><tspan x="609" dy="18" font-size="12" font-weight="normal" fill="#555">ranking + fairness metrics</tspan></text>

  <!-- Benchmark (bridge) -->
  <rect x="765" y="102" width="130" height="95" rx="9" fill="#bfe6f0" stroke="#2b2b2b" stroke-width="1.8"/>
  <text x="830" y="128" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1a1a">Benchmark<tspan x="830" dy="20" font-size="12" font-weight="normal" fill="#444">one shared</tspan><tspan x="830" dy="16" font-size="12" font-weight="normal" fill="#444">leaderboard</tspan><tspan x="830" dy="18" font-size="12" font-style="italic" font-weight="normal" fill="#555">bridges the rift</tspan></text>

  <!-- Reproducibility band -->
  <rect x="70" y="300" width="800" height="38" rx="7" fill="#f7f7f7" stroke="#b3b3b3" stroke-width="1.2" stroke-dasharray="5 4"/>
  <text x="470" y="324" text-anchor="middle" font-size="12" fill="#444"><tspan font-weight="bold" fill="#1a1a1a">Reproducibility</tspan> &#8212; seeded groups/splits &#183; deterministic ranking &#183; dataset checksums &#183; Experiment(git, env)</text>
</svg>
