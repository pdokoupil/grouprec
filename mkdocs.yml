site_name: grouprec
site_description: Group recommender systems for Python — results & profile aggregation behind one API
repo_url: https://github.com/pdokoupil/grouprec
theme:
  name: material
  features: [navigation.sections, navigation.top, content.code.copy, toc.integrate]
  palette:
    # colors are driven by docs/stylesheets/extra.css (shared with the inspector)
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
extra_css:
  - stylesheets/extra.css
nav:
  - Home: index.md
  - Design (the rift): design.md
  - Concepts: concepts.md
  - Datasets & licensing: datasets.md
  - Evaluation & the rift: evaluation.md
  - Reproducibility: reproducibility.md
  - Extending (algorithm/dataset/metric/group kind): extending.md
  - Integration (LensKit / RecBole / implicit): integration.md
  - Interactive inspector: INSPECTOR.md
  - Demo paper (RecSys 2026): papers/demo.md
markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.superfences
  - toc:
      permalink: true
plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_root_heading: true
            members_order: source
